name: Bug report
description: Something isn't working
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: What URL did you copy? What did you get back?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output
      description: |
        Paste the contents of `~/Library/Logs/nullroute/nullroute.log` and `nullroute.error.log` if relevant.
      render: text

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS Sequoia 15.3
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.13.1 — run `python3 --version`
    validations:
      required: true
