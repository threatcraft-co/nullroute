name: Feature request
description: Suggest something new
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check that it aligns with Nullroute's design constraints:
        no dependencies, no network calls in the daemon, no UI, headless only.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem you're running into, not just the solution.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
        - All platforms
    validations:
      required: true
