name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax
        run: python3 -m py_compile nullroute.py && echo "✓ nullroute.py syntax ok"

      - name: Check for unused imports / basic lint
        run: |
          pip install pyflakes --quiet
          python3 -m pyflakes nullroute.py

  shellcheck:
    name: Shell script lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck update-rules.sh
          shellcheck platform/macos/install.sh
          shellcheck platform/macos/uninstall.sh
